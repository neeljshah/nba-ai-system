<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NBA AI{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0f1117;
      --card:  #1c1f2e;
      --border:#2d3147;
      --blue:  #60a5fa;
      --gray:  #9ca3af;
      --white: #f1f5f9;
    }

    body { background: var(--bg); color: var(--white); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.5; }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    }
    nav .brand { font-size: 1.1rem; font-weight: 700; color: var(--white); }

    .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    h2 { font-size: 1.15rem; font-weight: 600; color: var(--gray); margin-bottom: 16px; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px;
    }

    .metric-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .metric {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 18px; min-width: 120px; text-align: center;
    }
    .metric-val { font-size: 1.6rem; font-weight: 700; color: var(--blue); }
    .metric-lbl { font-size: 0.75rem; color: var(--gray); margin-top: 3px; }

    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn {
      padding: 8px 16px; border: none; background: none; color: var(--gray);
      cursor: pointer; border-bottom: 2px solid transparent; font-size: 13px;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--white); border-bottom-color: var(--blue); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .graph-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 16px; }
    .graph-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .graph-card h3 { padding: 12px 14px; font-size: 0.9rem; color: var(--gray); border-bottom: 1px solid var(--border); }
    .graph-card img { width: 100%; display: block; }

    .btn {
      display: inline-block; padding: 8px 18px; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; border: none;
      background: var(--blue); color: #0f1117;
    }
    .btn:hover { opacity: 0.9; }
    .btn-ghost {
      background: none; color: var(--blue);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--blue); }

    .game-list { display: flex; flex-direction: column; gap: 10px; }
    .game-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 18px;
    }
    .game-item:hover { border-color: var(--blue); }
    .game-title { font-weight: 600; font-size: 1rem; }
    .game-meta  { font-size: 0.8rem; color: var(--gray); margin-top: 3px; }
    .badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 99px;
      background: #1e3a5f; color: var(--blue); font-weight: 600;
    }
    .badge.ready { background: #14532d; color: #4ade80; }

    .empty { color: var(--gray); text-align: center; padding: 60px 20px; }
  </style>
</head>
<body>
<nav>
  <span class="brand">🏀 NBA AI</span>
  <a href="/" style="color:var(--gray); font-size:13px;">All Games</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
<script>
  function showTab(tabName) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tabName));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "tab-" + tabName));
  }
</script>
</body>
</html>
